<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Doors">
    <link rel="apple-touch-icon" href="rspi.png">
    <link rel="manifest" href="manifest.json">
    <title>Door Selection - New Construction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>New Construction Door Selection</h1>

        <!-- Step 1: Project Info -->
        <div id="step-project" class="step active">
            <h2>Project Information</h2>
            <form id="project-form">
                <div class="form-group">
                    <label for="project-name">Project Name</label>
                    <input type="text" id="project-name" required placeholder="e.g. Smith Residence">
                </div>
                <div class="form-group">
                    <label for="project-address">Address</label>
                    <input type="text" id="project-address" required placeholder="Street Address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="project-city">City</label>
                        <input type="text" id="project-city" required placeholder="City">
                    </div>
                    <div class="form-group">
                        <label for="project-state">State</label>
                        <input type="text" id="project-state" required placeholder="State">
                    </div>
                    <div class="form-group">
                        <label for="project-zip">ZIP</label>
                        <input type="text" id="project-zip" required placeholder="ZIP Code">
                    </div>
                </div>
                <div class="form-group">
                    <label for="contact-name">Contact Name</label>
                    <input type="text" id="contact-name" required placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label for="contact-phone">Phone</label>
                    <input type="tel" id="contact-phone" required placeholder="(555) 555-5555">
                </div>
                <div class="form-group">
                    <label for="contact-email">Email</label>
                    <input type="email" id="contact-email" required placeholder="email@example.com">
                </div>
                <div class="button-row">
                    <button type="submit" class="btn btn-primary">Next - Add Doors</button>
                </div>
            </form>
        </div>

        <!-- Step 2: Door Selection -->
        <div id="step-door" class="step">
            <h2>Door Selection <span id="door-count"></span></h2>
            <form id="door-form">
                <div class="form-group">
                    <label for="room-name">Room / Location Name</label>
                    <input type="text" id="room-name" required placeholder="e.g. Master Bedroom, Hall Closet">
                </div>

                <div class="form-group">
                    <label>Door Handing (select one)</label>
                    <div class="door-options">
                        <label class="door-option">
                            <input type="radio" name="door-type" value="Left Hand" required>
                            <div class="door-card">
                                <img src="left_hand.png" alt="Left Hand Door">
                                <span>Left Hand</span>
                            </div>
                        </label>
                        <label class="door-option">
                            <input type="radio" name="door-type" value="Left Hand Reverse">
                            <div class="door-card">
                                <img src="left_hand_reverse.png" alt="Left Hand Reverse Door">
                                <span>Left Hand Reverse</span>
                            </div>
                        </label>
                        <label class="door-option">
                            <input type="radio" name="door-type" value="Right Hand">
                            <div class="door-card">
                                <img src="right_hand.png" alt="Right Hand Door">
                                <span>Right Hand</span>
                            </div>
                        </label>
                        <label class="door-option">
                            <input type="radio" name="door-type" value="Right Hand Reverse">
                            <div class="door-card">
                                <img src="right_hand_reverse.png" alt="Right Hand Reverse Door">
                                <span>Right Hand Reverse</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="rough-opening">Rough Opening (width x height)</label>
                        <input type="text" id="rough-opening" required placeholder='e.g. 26" x 82"'>
                    </div>
                    <div class="form-group">
                        <label for="door-width">Door Width</label>
                        <input type="text" id="door-width" required placeholder='e.g. 24"'>
                    </div>
                    <div class="form-group">
                        <label for="door-height">Door Height</label>
                        <input type="text" id="door-height" required placeholder='e.g. 80"'>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-primary">Add Another Door</button>
                    <button type="button" id="btn-finish" class="btn btn-success">Finish &amp; Generate PDF</button>
                </div>
            </form>
        </div>

        <!-- Step 3: Summary / PDF -->
        <div id="step-summary" class="step">
            <h2>Order Summary</h2>
            <div id="summary-content"></div>
            <div class="button-row">
                <button id="btn-download" class="btn btn-primary">Download PDF</button>
                <button id="btn-restart" class="btn btn-secondary">Start New Project</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="door-images.js"></script>
    <script src="app.js"></script>
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service worker registered'))
                .catch((err) => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
